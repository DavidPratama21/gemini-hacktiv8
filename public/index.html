<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Proxima - Productivity Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        <span>Proxima</span>
      </div>
      <div class="sidebar-menu">
        <div class="menu-item active">📝 Focus Chat</div>
        <div class="menu-item">📅 Today's Tasks</div>
        <div class="menu-item">⚙️ Settings</div>
      </div>
    </aside>
    
    <main class="main-content">
      <header class="chat-header">
        <div>
          <h1>Productivity Assistant</h1>
          <p class="subtitle">Always ready to help you focus and manage your tasks.</p>
        </div>
      </header>
      
      <div id="chat-box" class="chat-box">
        <div class="message bot">
          <div class="avatar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 10 10H12V2z"/><path d="M12 12L2.1 7.1"/></svg>
          </div>
          <div class="bubble">Halo! Saya adalah asisten produktivitasmu. Ada tugas yang ingin kamu selesaikan hari ini?</div>
        </div>
      </div>
      
      <div class="input-area">
        <form id="chat-form">
          <input type="text" id="user-input" placeholder="Ketik pesan atau rencanamu di sini..." autocomplete="off" required />
          <button type="submit">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          </button>
        </form>
      </div>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
